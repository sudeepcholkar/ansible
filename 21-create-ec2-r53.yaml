- name: create ec2 and r53 records
  hosts: localhost
  connection: local
  vars:
    subnet_id: "subnet-0cd7e9e1b7f938f70"
    sg_id:  "sg-0ce793bf79964187b"
    ami_id: "ami-0220d79f3f480ecf5"
    instances:
    - mysql
    - backend
    - frontend
    zone: cholkarx.online
  tasks:
  - name: ansible to install boto3 and botocore
    ansible.builtin.pip:
      name:
      - boto3
      - botocore
      executable: pip3.9
    
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: "{{ subnet_id }}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
    loop: "{{ instances }}"
    register: ec2_instance

  - name: print output
    ansible.builtin.debug:
      msg: "{{ ec2_instance }}"

#Private IP R53
  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ zone }}"
      record: "{{ item.item }}.{{ zone }}" #mysql.cholkarx.online
      type: A 
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
      overwrite: true
      loop: "{{ ec2_instance.results }}"

#Public record
  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ zone }}"
      record: "{{ zone }}" #mysql.cholkarx.online
      type: A 
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
      overwrite: true
      loop: "{{ ec2_instance.results }}"
      when: item.item == "frontend"
